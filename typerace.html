<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Type Rush — Arcade</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#07070f;--border:#1e1e3a;--magenta:#f72585;--cyan:#00f5d4;--yellow:#f9c74f;--green:#06d6a0;--red:#ef233c;--text:#e8e8ff;--muted:#6060a0}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(247,37,133,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(247,37,133,.02) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
    .page{position:relative;z-index:1;width:100%;max-width:620px;padding:28px 16px 40px;display:flex;flex-direction:column;align-items:center;gap:16px}
    .nav{width:100%;display:flex;align-items:center;justify-content:space-between}
    .back-btn{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);text-decoration:none;letter-spacing:1px;transition:color .2s}
    .back-btn:hover{color:var(--magenta)}
    .back-btn::before{content:'◄ '}
    .game-label{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--magenta);opacity:.6}
    h1{font-family:'Press Start 2P',monospace;font-size:clamp(12px,3vw,20px);letter-spacing:3px;color:var(--magenta);text-shadow:0 0 16px rgba(247,37,133,.5)}
    .stats{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
    .stat{text-align:center}
    .stat-label{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:3px}
    .stat-value{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--magenta)}
    .stat-value.y{color:var(--yellow)}
    .stat-value.g{color:var(--green)}
    /* Timer bar */
    .timer-bar-wrap{width:100%;max-width:580px;height:6px;background:var(--border)}
    #timer-bar{height:100%;background:var(--magenta);transition:width .1s linear;box-shadow:0 0 6px var(--magenta)}
    /* Word field */
    .word-field{width:100%;max-width:580px;height:300px;background:#04040e;border:2px solid var(--border);position:relative;overflow:hidden}
    .word-field::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,rgba(247,37,133,.15));pointer-events:none}
    .falling-word{position:absolute;font-family:'Press Start 2P',monospace;font-size:12px;letter-spacing:1px;white-space:nowrap;transition:none;pointer-events:none;padding:4px 8px;border:1px solid transparent}
    .falling-word.matched{color:var(--green);border-color:rgba(6,214,160,.4);text-shadow:0 0 8px var(--green)}
    .falling-word.danger{color:var(--red)}
    /* Input area */
    .input-row{display:flex;gap:10px;width:100%;max-width:580px}
    #word-input{flex:1;font-family:'Press Start 2P',monospace;font-size:13px;background:#04040e;border:2px solid var(--border);color:var(--text);padding:12px 16px;outline:none;transition:border-color .15s;letter-spacing:2px}
    #word-input:focus{border-color:var(--magenta)}
    #word-input.correct{border-color:var(--green);color:var(--green)}
    #word-input.wrong{border-color:var(--red);animation:shake .2s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .clr-btn{font-family:'Press Start 2P',monospace;font-size:8px;padding:0 14px;background:transparent;border:2px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
    .clr-btn:hover{border-color:var(--magenta);color:var(--magenta)}
    /* Overlay */
    .overlay{position:fixed;inset:0;background:rgba(7,7,15,.93);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
    .overlay.hidden{display:none}
    .ov-title{font-family:'Press Start 2P',monospace;font-size:clamp(14px,4vw,24px);letter-spacing:2px;color:var(--magenta);text-shadow:0 0 20px var(--magenta)}
    .ov-sub{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;text-align:center;line-height:2.4}
    .ov-btn{font-family:'Press Start 2P',monospace;font-size:10px;padding:14px 32px;border:none;cursor:pointer;letter-spacing:1px;background:var(--magenta);color:#fff;box-shadow:0 0 20px var(--magenta);transition:box-shadow .2s}
    .ov-btn:hover{box-shadow:0 0 40px var(--magenta)}
    /* Diff */
    .diff-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .diff-btn{font-family:'Press Start 2P',monospace;font-size:7px;padding:8px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:1px;transition:all .15s}
    .diff-btn:hover{border-color:var(--magenta);color:var(--magenta)}
    .diff-btn.active{border-color:var(--magenta);color:#fff;background:var(--magenta);box-shadow:0 0 10px var(--magenta)}
  </style>
</head>
<body>
<div class="page">
  <nav class="nav">
    <a class="back-btn" href="arcade.html">ARCADE</a>
    <span class="game-label">GAME 10</span>
  </nav>
  <h1>TYPE RUSH</h1>
  <div class="diff-row">
    <button class="diff-btn active" data-level="1">EASY</button>
    <button class="diff-btn" data-level="2">MEDIUM</button>
    <button class="diff-btn" data-level="3">HARD</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">SCORE</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">WPM</div><div class="stat-value g" id="wpm">0</div></div>
    <div class="stat"><div class="stat-label">LIVES</div><div class="stat-value y" id="lives-disp">❤❤❤</div></div>
    <div class="stat"><div class="stat-label">TIME</div><div class="stat-value" id="time-disp">60</div></div>
  </div>
  <div class="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>
  <div class="word-field" id="word-field"></div>
  <div class="input-row">
    <input type="text" id="word-input" placeholder="TYPE HERE..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <button class="clr-btn" id="clr-btn">CLR</button>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="ov-title" id="ov-title">TYPE RUSH</div>
  <div class="ov-sub" id="ov-sub">WORDS FALL FROM THE TOP<br>TYPE THEM BEFORE THEY HIT THE BOTTOM<br>3 MISSES = GAME OVER</div>
  <div class="diff-row" style="margin-top:4px">
    <button class="diff-btn active" data-level="1" id="od-1">EASY</button>
    <button class="diff-btn" data-level="2" id="od-2">MEDIUM</button>
    <button class="diff-btn" data-level="3" id="od-3">HARD</button>
  </div>
  <button class="ov-btn" id="ov-btn">▶ START</button>
  <a id="ov-arcade-link" href="arcade.html" style="display:none;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-top:4px;transition:color .2s">◄ BACK TO ARCADE</a>
</div>
<script src="firebase-config.js"></script>
<script src="leaderboard.js"></script>
<script>
  // LB safety shim - no-op if leaderboard.js failed to load
  if(typeof LB==='undefined') window.LB={submit:(_g,_s,_l,cb)=>{if(cb)cb();},show:()=>{},fetchEntries:()=>Promise.resolve({entries:[],online:false}),FB_ON:false,puzzleScore:(m,s,c)=>Math.max(1,Math.round(10000/(m*.6+Math.max(1,s)*.4)*(c<=3?1:c<=5?2.5:5))),memoryScore:(p,f,s)=>Math.max(1,Math.round(p*1200/(f*.55+Math.max(1,s)*.45))),reactionScore:(a)=>Math.max(1,Math.round(50000/a))};

const WORDS_EASY=['cat','dog','sun','run','fly','hit','map','cup','key','fox','bit','log','win','zip','art','sky','gem','bug','hop','jet','red','box','jam','ink','oak','tip','web','cub','dew','elk','fan','gap','hue','ivy','jab','keg','lip','mud','net','orb','paw','quiz','rod','sap','tan','urn','van','wax','yak','zap'];
const WORDS_MED=['pixel','storm','laser','magic','ghost','flame','sword','tower','brave','crisp','frost','blend','glare','kneel','print','shard','thorn','twist','vault','witch','clamp','dread','ember','flint','graze','hatch','joust','knack','lunge','merge','noble','oxide','plume','quest','rivet','scout','smear','truce','ulcer','venom','waltz','xenon','yacht','zesty','anvil','broth','chasm','delta','epoch','fjord'];
const WORDS_HARD=['phantom','crystal','journey','kingdom','eclipse','curious','lantern','crimson','whisper','marshal','torpedo','triumph','balance','cascade','dynamic','glacier','horizon','pioneer','quantum','silence','archival','blizzard','classify','deflect','embrace','furnace','gryphon','harbinger','isolate','javelin','kingdom','lacquer','mystique','nominal','obscure','pilgrim','quandary','rampant','solstice','tangent','uncanny','vagrant','warlock','xenolith','yielding','zealotry','abrasive','catapult','dispatch','ferocity'];
const WORDS_INSANE=['frequency','algorithm','adventure','mystical','labyrinth','forgotten','celestial','threshold','momentum','authentic','blizzard','framework','lightning','character','telescope','orchestra','rebellion','sanctuary','xenophobe','pneumatic','aboriginal','catastrophe','differential','equilibrium','fluorescent','grandfather','hieroglyphic','imagination','juxtaposed','kaleidoscope','labyrinthine','metamorphic','nonchalant','orchestrate','phenomenal','quintessential','renaissance','surveillance','treacherous','unequivocal','virtuosity','whimsical','xylophone','yellowstone','zigzagging','acceleration','bibliography','circumnavigate','disillusion','electromagnetic'];

const TOTAL_TIME=60;
let level=2, running=false, score=0, lives=3, wordsTyped=0, timeLeft=TOTAL_TIME;
let fallingWords=[], spawnTimer=null, timerInt=null, rAF;
let wordId=0;

document.querySelectorAll('.diff-btn').forEach(b=>b.addEventListener('click',()=>setLevel(parseInt(b.dataset.level),false)));
document.querySelectorAll('#od-1,#od-2,#od-3').forEach(b=>b.addEventListener('click',()=>setLevel(parseInt(b.dataset.level),true)));

function setLevel(l, fromOverlay){
  level=l;
  document.querySelectorAll(fromOverlay?'#od-1,#od-2,#od-3':'.diff-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.level)===l));
}

function getWordList(){ return level===1?WORDS_EASY:level===2?WORDS_MED:level===3?WORDS_HARD:WORDS_INSANE; }
function getFallSpeed(){ return level===1 ? (0.4+1*0.25)*0.85 : 0.4+level*0.25; }
function getSpawnInterval(){ return level===1?2200:level===2?1700:1300; }
function getFieldW(){ return document.getElementById('word-field').clientWidth; }
function getFieldH(){ return document.getElementById('word-field').clientHeight||300; }

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  score=0; lives=3; wordsTyped=0; timeLeft=TOTAL_TIME; running=true;
  document.getElementById('score').textContent=0;
  document.getElementById('wpm').textContent=0;
  document.getElementById('lives-disp').textContent='❤❤❤';
  document.getElementById('time-disp').textContent=TOTAL_TIME;
  document.getElementById('timer-bar').style.width='100%';
  document.getElementById('timer-bar').style.background='var(--magenta)';
  document.getElementById('word-field').innerHTML='';
  document.getElementById('word-input').value='';
  document.getElementById('word-input').focus();
  fallingWords=[]; clearTimeout(spawnTimer); clearInterval(timerInt);

  spawnWord();
  timerInt=setInterval(tick,1000);
  rAF=requestAnimationFrame(animLoop);
}

function tick(){
  timeLeft--;
  document.getElementById('time-disp').textContent=timeLeft;
  const pct=timeLeft/TOTAL_TIME*100;
  document.getElementById('timer-bar').style.width=pct+'%';
  if(pct<30) document.getElementById('timer-bar').style.background='var(--red)';
  else if(pct<60) document.getElementById('timer-bar').style.background='var(--yellow)';
  if(timeLeft<=0) endGame();
}

function spawnWord(){
  if(!running) return;
  const list=getWordList();
  const word=list[Math.floor(Math.random()*list.length)];
  const fw=getFieldW();
  const el=document.createElement('div');
  el.className='falling-word';
  el.textContent=word;
  el.dataset.word=word;
  el.dataset.id=wordId++;
  const x=20+Math.random()*(fw-word.length*10-40);
  el.style.left=x+'px';
  el.style.top='-30px';
  el.style.color='rgba(200,200,255,0.85)';
  document.getElementById('word-field').appendChild(el);
  fallingWords.push({el,word,y:-30,speed:getFallSpeed()+Math.random()*0.3});
  spawnTimer=setTimeout(spawnWord, getSpawnInterval());
}

function animLoop(){
  if(!running){ return; }
  const fh=getFieldH();
  fallingWords.forEach(fw=>{
    fw.y+=fw.speed;
    fw.el.style.top=fw.y+'px';
    const pct=fw.y/fh;
    if(pct>0.7) fw.el.classList.add('danger');
    if(fw.y>fh){
      fw.el.remove();
      fw.done=true;
      loseLife();
    }
  });
  fallingWords=fallingWords.filter(w=>!w.done);
  rAF=requestAnimationFrame(animLoop);
}

function loseLife(){
  if(!running) return;
  lives--;
  document.getElementById('lives-disp').textContent='❤'.repeat(Math.max(0,lives));
  if(lives<=0) endGame();
}

document.getElementById('word-input').addEventListener('input', e=>{
  const typed=e.target.value.trim().toLowerCase();
  // Check for exact match
  const idx=fallingWords.findIndex(fw=>fw.word.toLowerCase()===typed);
  if(idx!==-1){
    const fw=fallingWords[idx];
    fw.el.classList.add('matched');
    const bonus=Math.max(1,Math.floor((1-(fw.y/getFieldH()))*3));
    score+=fw.word.length*10*bonus;
    document.getElementById('score').textContent=score;
    wordsTyped++;
    const elapsed=TOTAL_TIME-timeLeft||1;
    document.getElementById('wpm').textContent=Math.round(wordsTyped/(elapsed/60));
    setTimeout(()=>fw.el.remove(),200);
    fallingWords[idx].done=true;
    fallingWords=fallingWords.filter(w=>!w.done);
    e.target.value='';
    e.target.className='';
  } else {
    // Partial match highlight
    const partial=fallingWords.some(fw=>fw.word.toLowerCase().startsWith(typed)&&typed.length>0);
    e.target.className=partial?'':'';
  }
});

document.getElementById('clr-btn').addEventListener('click',()=>{ document.getElementById('word-input').value=''; document.getElementById('word-input').focus(); });

function endGame(){
  running=false; clearInterval(timerInt); clearTimeout(spawnTimer); cancelAnimationFrame(rAF);
  document.getElementById('word-input').blur();
  const elapsed=TOTAL_TIME-timeLeft||1;
  const wpm=Math.round(wordsTyped/(elapsed/60));
  const accuracy=wordsTyped>0?Math.min(100,Math.round(wordsTyped/(wordsTyped+(3-Math.max(0,lives)))*100)):0;
  const lbScore=Math.round(wpm*accuracy);
  LB.submit('typerace',lbScore,`WPM: ${wpm} &nbsp;·&nbsp; SCORE: ${score}`,()=>{
    const ov=document.getElementById('overlay');
    document.getElementById('ov-title').textContent='TIME\'S UP!';
    document.getElementById('ov-sub').innerHTML=`WORDS: ${wordsTyped} &nbsp;·&nbsp; WPM: ${wpm}<br>SCORE: ${score}`;
    document.getElementById('ov-btn').textContent='▶ PLAY AGAIN';
    document.getElementById('ov-arcade-link').style.display='block';
    ov.classList.remove('hidden');
  });
}

document.getElementById('ov-btn').addEventListener('click',startGame);
</script>
</body>
</html>
