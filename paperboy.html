<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paper Run — Arcade</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#07070f;--border:#1e1e3a;--yellow:#f9c74f;--magenta:#f72585;--cyan:#00f5d4;--green:#06d6a0;--orange:#fb8500;--text:#e8e8ff;--muted:#6060a0}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}
    .page{position:relative;z-index:1;width:100%;max-width:600px;padding:18px 16px 10px;display:flex;flex-direction:column;align-items:center;gap:10px}
    .nav{width:100%;display:flex;align-items:center;justify-content:space-between}
    .back-btn{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);text-decoration:none;letter-spacing:1px;transition:color .2s}
    .back-btn:hover{color:var(--yellow)}
    .back-btn::before{content:'◄ '}
    .game-label{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--yellow);opacity:.6}
    h1{font-family:'Press Start 2P',monospace;font-size:clamp(12px,3vw,19px);letter-spacing:3px;color:var(--yellow);text-shadow:0 0 16px rgba(249,199,79,.5)}
    .stats{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
    .stat{text-align:center}
    .stat-label{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);letter-spacing:2px;margin-bottom:3px}
    .stat-value{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--yellow)}
    .stat-value.g{color:var(--green)}
    .lives-row{display:flex;gap:6px;align-items:center;min-height:16px}
    .life-pip{font-size:13px}
    .canvas-wrap{position:relative;border:2px solid var(--border);touch-action:none}
    #gc{display:block}
    .overlay{position:absolute;inset:0;background:rgba(7,7,15,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
    .overlay.hidden{display:none}
    .ov-title{font-family:'Press Start 2P',monospace;font-size:clamp(13px,3vw,20px);letter-spacing:2px;color:var(--yellow);text-shadow:0 0 16px var(--yellow);text-align:center;line-height:1.6}
    .ov-sub{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);letter-spacing:1px;text-align:center;line-height:2.4}
    .ov-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 28px;border:none;cursor:pointer;letter-spacing:1px;background:var(--yellow);color:#000;box-shadow:0 0 16px rgba(249,199,79,.4);transition:box-shadow .2s}
    .ov-btn:hover{box-shadow:0 0 32px var(--yellow)}
    .throw-btn{font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 28px;background:var(--orange);color:#000;border:none;cursor:pointer;box-shadow:0 0 12px rgba(251,133,0,.4);display:none;touch-action:manipulation}
    @media(max-width:600px){.throw-btn{display:block}}
  </style>
</head>
<body>
<div class="page">
  <nav class="nav">
    <a class="back-btn" href="index.html">ARCADE</a>
    <span class="game-label">GAME 14</span>
  </nav>
  <h1>PAPER RUN</h1>
  <div class="stats">
    <div class="stat"><div class="stat-label">SCORE</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">STREAK</div><div class="stat-value g" id="streak">0</div></div>
    <div class="stat"><div class="stat-label">PAPERS</div><div class="stat-value" id="papers">10</div></div>
    <div class="stat"><div class="stat-label">BEST</div><div class="stat-value" id="best">0</div></div>
  </div>
  <div class="lives-row" id="lives-row"></div>
  <div class="canvas-wrap">
    <canvas id="gc"></canvas>
    <div class="overlay" id="overlay">
      <div class="ov-title">PAPER RUN</div>
      <div class="ov-sub">
        RIDE DOWN THE STREET<br>
        THROW PAPERS AT GLOWING HOUSES<br>
        DODGE OBSTACLES OR LOSE A LIFE<br><br>
        ← → MOVE &nbsp;·&nbsp; SPACE THROW
      </div>
      <button class="ov-btn" id="ov-start">▶ START</button>
    </div>
  </div>
  <button class="throw-btn" id="throw-btn">🗞 THROW PAPER</button>
</div>

<script src="firebase-config.js"></script>
<script src="leaderboard.js"></script>
<script>
if(typeof LB==='undefined') window.LB={submit:(_g,_s,_l,cb)=>{if(cb)cb();},show:()=>{},fetchEntries:()=>Promise.resolve({entries:[],online:false}),FB_ON:false,puzzleScore:()=>0,memoryScore:()=>0,reactionScore:()=>0};

const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const W=Math.min(window.innerWidth-32,520);
const H=Math.min(window.innerHeight-200,540);
canvas.width=W; canvas.height=H;

// ── DIAGONAL ROAD GEOMETRY ────────────────────────────────────────────────
// Road goes from bottom-left (player) to top-right (horizon)
// Objects travel from top-right → bottom-left (coming TOWARD the player)
const ANGLE = 42 * Math.PI / 180;
const COS_A = Math.cos(ANGLE);   // ≈ 0.743  (right per unit of road dist)
const SIN_A = Math.sin(ANGLE);   // ≈ 0.669  (up per unit of road dist)

// Road unit direction (ahead = NE, toward horizon)
const RD_X = COS_A;   // positive = screen right
const RD_Y = -SIN_A;  // negative = screen up

// Perpendicular RIGHT direction (SE, across road to right side)
const PR_X = SIN_A;
const PR_Y = COS_A;

// Player fixed screen origin (bottom-left area)
const ORIG_X = W * 0.17;
const ORIG_Y = H * 0.83;

const ROAD_HALF = 52;       // half road width in road units
const SPAWN_DIST = 640;     // how far ahead objects spawn
const HOUSE_GAP = 190;      // spacing between house clusters

function roadToScreen(rdist, rperp) {
  return {
    sx: ORIG_X + rdist * RD_X + rperp * PR_X,
    sy: ORIG_Y + rdist * RD_Y + rperp * PR_Y
  };
}

// Perspective scale: things farther away are smaller
function perspScale(rdist) {
  return Math.max(0.28, 1 - rdist * 0.0011);
}

// ── STATE ─────────────────────────────────────────────────────────────────
let scrollDist=0, speed=2.1, frameCount=0;
let playerPerp=0, playerInv=0;
let score=0, streak=0, lives=3, papersLeft=10, running=false, rAF;
let objects=[], papers=[], particles=[];
let nextSpawnAt=200, totalDeliveries=0, hitDeliveries=0;
let best=parseInt(localStorage.getItem('paperBest')||'0');
let throwCooldown=0;
document.getElementById('best').textContent=best;

// ── INPUT ─────────────────────────────────────────────────────────────────
const KEYS={};
document.addEventListener('keydown',e=>{
  KEYS[e.code]=true;
  const ov=document.getElementById('overlay');
  if(e.code==='Space'&&running&&ov.classList.contains('hidden')){e.preventDefault();throwPaper();}
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code))e.preventDefault();
});
document.addEventListener('keyup',e=>KEYS[e.code]=false);

// Touch: swipe across road to move
let lastTouchX=null;
canvas.addEventListener('touchstart',e=>{
  const ov=document.getElementById('overlay');
  if(!ov.classList.contains('hidden'))return;
  e.preventDefault(); lastTouchX=e.touches[0].clientX;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!running||lastTouchX===null)return;
  e.preventDefault();
  const dx=e.touches[0].clientX-lastTouchX;
  playerPerp=Math.max(-ROAD_HALF,Math.min(ROAD_HALF,playerPerp+dx*0.5));
  lastTouchX=e.touches[0].clientX;
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();lastTouchX=null;},{passive:false});
document.getElementById('throw-btn').addEventListener('click',()=>{if(running)throwPaper();});

// ── SETUP ─────────────────────────────────────────────────────────────────
function renderLives(){ document.getElementById('lives-row').innerHTML=Array(Math.max(0,lives)).fill('<span class="life-pip">🚲</span>').join(''); }
function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('streak').textContent=streak;
  document.getElementById('papers').textContent=papersLeft;
  if(score>best){best=score;localStorage.setItem('paperBest',best);document.getElementById('best').textContent=best;}
}

function startGame(){
  scrollDist=0; speed=2.1; frameCount=0;
  playerPerp=0; playerInv=0;
  score=0; streak=0; lives=3; papersLeft=10; throwCooldown=0;
  objects=[]; papers=[]; particles=[];
  nextSpawnAt=160; totalDeliveries=0; hitDeliveries=0;
  running=true;
  updateHUD(); renderLives();
  document.getElementById('overlay').classList.add('hidden');
  cancelAnimationFrame(rAF);
  loop();
}

// ── SPAWN ──────────────────────────────────────────────────────────────────
function spawnObjects(){
  // Keep spawning ahead of player as they scroll
  while(scrollDist + SPAWN_DIST > nextSpawnAt){
    const baseDist = nextSpawnAt;
    nextSpawnAt += HOUSE_GAP + Math.random()*80;

    // House on left side (main delivery side)
    const sub = Math.random()<0.68;
    if(sub) totalDeliveries++;
    objects.push({type:'house', baseDist, rperp:-(ROAD_HALF+55+Math.random()*25),
      subscriber:sub, hit:false, flash:0, num:Math.floor(Math.random()*900)+100, side:'left'});

    // Occasional right-side house
    if(Math.random()<0.42){
      const sub2=Math.random()<0.45;
      if(sub2) totalDeliveries++;
      objects.push({type:'house', baseDist:baseDist+25+Math.random()*30,
        rperp:ROAD_HALF+55+Math.random()*25,
        subscriber:sub2, hit:false, flash:0, num:Math.floor(Math.random()*900)+100, side:'right'});
    }

    // Obstacle on road
    if(Math.random()<0.52){
      const types=['car','cone','dog','puddle'];
      const otype=types[Math.floor(Math.random()*types.length)];
      const rperp=(Math.random()*2-1)*ROAD_HALF*0.72;
      objects.push({type:'obstacle', otype, baseDist:baseDist+70+Math.random()*60,
        rperp, hw:otype==='car'?18:11, hh:otype==='car'?28:11, hit:false});
    }
  }
}

// ── THROW ──────────────────────────────────────────────────────────────────
function throwPaper(){
  if(throwCooldown>0||papersLeft<=0) return;

  const {sx:px, sy:py} = roadToScreen(0, playerPerp);

  // Only aim at subscriber houses that still need a paper
  // Prefer houses on the same side of the road as the player
  let target=null, bestScore=Infinity;
  for(const o of objects){
    if(o.type!=='house'||o.hit||!o.subscriber) continue;
    const eff=o.baseDist-scrollDist;
    if(eff<5||eff>420) continue;
    const {sx,sy}=roadToScreen(eff,o.rperp);
    const screenDist=Math.hypot(sx-px, sy-py);
    // Heavy penalty for houses on the opposite side of the road
    const playerSide = playerPerp <= 0 ? 'left' : 'right';
    const sidePenalty = o.side !== playerSide ? 300 : 0;
    const score = screenDist + sidePenalty;
    if(score<bestScore){bestScore=score; target={sx,sy};}
  }
  if(!target){
    // No subscriber houses nearby — throw toward same side as player
    const goLeft = playerPerp <= 0;
    const t=roadToScreen(200, goLeft ? -(ROAD_HALF+70) : (ROAD_HALF+70));
    target={sx:t.sx, sy:t.sy};
  }

  // Aim directly at target with fixed travel time
  // Use a consistent flight time so paper arcs naturally
  const dx=target.sx-px;
  const dy=target.sy-(py-12);
  const dist=Math.hypot(dx,dy);

  // Scale flight time with distance so speed feels consistent
  const PAPER_SPEED = 9;
  const tf = Math.max(16, Math.min(60, dist/PAPER_SPEED));

  const G=0.055;
  // vsy needed to reach dy in tf frames accounting for gravity
  // dy = vsy*tf + 0.5*G*tf^2  =>  vsy = (dy - 0.5*G*tf^2) / tf
  const vsy = (dy - 0.5*G*tf*tf) / tf;
  const vsx = dx / tf;

  papers.push({sx:px, sy:py-12, vsx, vsy, rot:0});
  papersLeft--;
  throwCooldown=15;
  updateHUD();
}

// ── UPDATE ─────────────────────────────────────────────────────────────────
function update(){
  frameCount++;
  if(throwCooldown>0) throwCooldown--;
  if(playerInv>0) playerInv--;

  // Very gradual speed increase
  speed = 2.1 + Math.floor(scrollDist/900)*0.14;
  scrollDist += speed;

  spawnObjects();

  // Player movement (perpendicular to road)
  if(KEYS['ArrowLeft']||KEYS['KeyA']) playerPerp=Math.max(-ROAD_HALF, playerPerp-2.6);
  else if(KEYS['ArrowRight']||KEYS['KeyD']) playerPerp=Math.min(ROAD_HALF, playerPerp+2.6);

  // Replenish papers
  if(papersLeft===0 && scrollDist>300){
    papersLeft=8; spawnBurst(roadToScreen(0,playerPerp),'#f9c74f'); updateHUD();
  }

  // Update papers
  papers=papers.filter(p=>{
    p.sx+=p.vsx; p.sy+=p.vsy; p.vsy+=0.055; p.rot+=0.14;
    // Hit check against houses
    for(const o of objects){
      if(o.type!=='house'||o.hit) continue;
      const eff=o.baseDist-scrollDist;
      if(eff<-60||eff>SPAWN_DIST) continue;
      const {sx,sy}=roadToScreen(eff,o.rperp);
      const sc=perspScale(eff);
      if(Math.abs(p.sx-sx)<68*sc && Math.abs(p.sy-sy)<56*sc){
        o.hit=true; o.flash=30;
        if(o.subscriber){
          hitDeliveries++; streak++;
          const mult=streak>=3?Math.min(streak,6):1;
          score+=100*mult;
          spawnBurst({sx:p.sx,sy:p.sy},'#06d6a0');
        } else {
          streak=0; score=Math.max(0,score-30);
          spawnBurst({sx:p.sx,sy:p.sy},'#f72585');
        }
        updateHUD();
        return false;
      }
    }
    return p.sx>-30&&p.sx<W+30&&p.sy>-80&&p.sy<H+40;
  });

  // Player vs obstacles
  if(playerInv===0){
    const {sx:plx,sy:ply}=roadToScreen(0,playerPerp);
    for(const o of objects){
      if(o.type!=='obstacle'||o.hit) continue;
      const eff=o.baseDist-scrollDist;
      if(Math.abs(eff)>55) continue;
      const {sx,sy}=roadToScreen(eff,o.rperp);
      if(Math.abs(plx-sx)<30&&Math.abs(ply-sy)<30){
        o.hit=true; streak=0; lives--;
        spawnBurst({sx:plx,sy:ply},'#f72585');
        playerInv=100; updateHUD(); renderLives();
        if(lives<=0){endGame();return;}
      }
    }
  }

  // Remove far-behind objects
  objects=objects.filter(o=>o.baseDist-scrollDist>-120);

  // Particles
  particles=particles.filter(p=>{p.sx+=p.vsx;p.sy+=p.vsy;p.life--;return p.life>0;});
}

function spawnBurst(pos,color){
  for(let i=0;i<10;i++) particles.push({sx:pos.sx,sy:pos.sy,vsx:(Math.random()-.5)*5,vsy:(Math.random()-.5)*5-1,color,life:22+Math.random()*14});
}

// ── GAME OVER ──────────────────────────────────────────────────────────────
function endGame(){
  running=false; cancelAnimationFrame(rAF);
  const acc=totalDeliveries>0?Math.round(hitDeliveries/totalDeliveries*100):0;
  LB.submit('paperboy',score,`SCORE: ${score} &nbsp;·&nbsp; ACC: ${acc}%`,()=>{
    const ov=document.getElementById('overlay');
    ov.querySelector('.ov-title').textContent='WIPEOUT!';
    ov.querySelector('.ov-title').style.color='var(--magenta)';
    ov.querySelector('.ov-sub').innerHTML=`SCORE: ${score}<br>ACCURACY: ${acc}%`;
    const btn=ov.querySelector('.ov-btn');
    btn.textContent='↺ RETRY';
    const fresh=btn.cloneNode(true);
    btn.parentNode.replaceChild(fresh,btn);
    fresh.addEventListener('click',startGame);
    ov.classList.remove('hidden');
  });
}

// ── LOOP ──────────────────────────────────────────────────────────────────
function loop(){ rAF=requestAnimationFrame(loop); if(running)update(); draw(); }

// ── DRAW ──────────────────────────────────────────────────────────────────
function draw(){
  // Sky / grass background
  const sky=ctx.createLinearGradient(0,0,W,H);
  sky.addColorStop(0,'#0a0a18'); sky.addColorStop(1,'#0d1a0d');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Grass texture (simple dots)
  ctx.fillStyle='rgba(20,50,20,0.4)';
  for(let i=0;i<30;i++) ctx.fillRect((i*137+scrollDist*0.3)%W,(i*73)%H,2,2);

  // Draw sidewalks and road
  drawRoad();

  // Sort objects: draw farthest first (higher rdist = farther = draw first)
  const vis=objects
    .map(o=>({...o,eff:o.baseDist-scrollDist}))
    .filter(o=>o.eff>-90&&o.eff<SPAWN_DIST+20)
    .sort((a,b)=>b.eff-a.eff);

  for(const o of vis){
    const {sx,sy}=roadToScreen(o.eff,o.rperp);
    if(sx<-100||sx>W+100||sy<-100||sy>H+100) continue;
    const sc=perspScale(o.eff);
    if(o.flash>0) o.flash--;
    if(o.type==='house') drawHouse(sx,sy,o,sc);
    else if(o.type==='obstacle') drawObstacle(sx,sy,o,sc);
  }

  // Papers in flight
  papers.forEach(p=>{
    ctx.save(); ctx.translate(p.sx,p.sy); ctx.rotate(p.rot);
    ctx.fillStyle='#e8e8cc';
    ctx.fillRect(-5,-4,10,8);
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.5;
    ctx.strokeRect(-5,-4,10,8);
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/35;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.sx,p.sy,3,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Player
  drawPlayer();

  // HUD
  ctx.fillStyle='rgba(7,7,15,0.7)'; ctx.fillRect(0,0,W,26);
  ctx.font="8px 'Press Start 2P'"; ctx.textAlign='left'; ctx.fillStyle='#f9c74f';
  ctx.fillText(`DIST: ${Math.floor(scrollDist)}m`,8,17);
  ctx.textAlign='right';
  ctx.fillStyle=papersLeft<=2?'#f72585':'#e8e8ff';
  ctx.fillText(`📰${papersLeft}`,W-8,17);
  ctx.textAlign='left';
}

function drawRoad(){
  const steps=18;

  // Left sidewalk
  ctx.beginPath();
  for(let i=0;i<=steps;i++){const{sx,sy}=roadToScreen(i/steps*620,-(ROAD_HALF)); i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
  for(let i=steps;i>=0;i--){const{sx,sy}=roadToScreen(i/steps*620,-(ROAD_HALF+70)); ctx.lineTo(sx,sy);}
  ctx.closePath(); ctx.fillStyle='#1e1e2a'; ctx.fill();

  // Right sidewalk
  ctx.beginPath();
  for(let i=0;i<=steps;i++){const{sx,sy}=roadToScreen(i/steps*620,(ROAD_HALF)); i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
  for(let i=steps;i>=0;i--){const{sx,sy}=roadToScreen(i/steps*620,(ROAD_HALF+70)); ctx.lineTo(sx,sy);}
  ctx.closePath(); ctx.fillStyle='#1a1a28'; ctx.fill();

  // Road
  ctx.beginPath();
  for(let i=0;i<=steps;i++){const{sx,sy}=roadToScreen(i/steps*620,-ROAD_HALF); i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
  for(let i=steps;i>=0;i--){const{sx,sy}=roadToScreen(i/steps*620,ROAD_HALF); ctx.lineTo(sx,sy);}
  ctx.closePath();
  const rg=ctx.createLinearGradient(ORIG_X,ORIG_Y,ORIG_X+400*RD_X,ORIG_Y+400*RD_Y);
  rg.addColorStop(0,'#181824'); rg.addColorStop(1,'#101018');
  ctx.fillStyle=rg; ctx.fill();

  // Road edges
  ctx.strokeStyle='rgba(255,255,255,0.13)'; ctx.lineWidth=1.5;
  for(const side of[-ROAD_HALF,ROAD_HALF]){
    ctx.beginPath();
    for(let i=0;i<=steps;i++){const{sx,sy}=roadToScreen(i/steps*620,side); i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
    ctx.stroke();
  }

  // Centre dashes
  ctx.setLineDash([14,11]); ctx.strokeStyle='rgba(249,199,79,0.1)'; ctx.lineWidth=1.2;
  ctx.lineDashOffset=-(scrollDist%25);
  ctx.beginPath();
  for(let i=0;i<=steps;i++){const{sx,sy}=roadToScreen(i/steps*620,0); i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}
  ctx.stroke(); ctx.setLineDash([]);
}

function drawHouse(sx,sy,o,sc){
  const hw=50*sc, hh=42*sc;
  ctx.save(); ctx.translate(sx,sy);

  // Glow for subscribers
  if(o.subscriber&&!o.hit){
    ctx.shadowBlur=o.flash>0?18:7;
    ctx.shadowColor=o.flash>0?'#06d6a0':'#f9c74f';
  }

  // Body
  ctx.fillStyle=o.hit?'#1a3a1a':o.flash>0?'#0a2a0a':'#1e1e34';
  ctx.fillRect(-hw/2,-hh,hw,hh);

  // Roof
  ctx.fillStyle=o.hit?'#2a5a2a':'#2a1a3c';
  ctx.beginPath(); ctx.moveTo(-hw/2-3,-hh); ctx.lineTo(0,-hh-16*sc); ctx.lineTo(hw/2+3,-hh); ctx.closePath(); ctx.fill();

  // Door
  const dw=12*sc, dh=18*sc;
  ctx.fillStyle=o.subscriber&&!o.hit?'#f9c74f':'#3a2a1a';
  ctx.fillRect(-dw/2,-dh,dw,dh);
  if(o.subscriber&&!o.hit){
    ctx.shadowBlur=10; ctx.shadowColor='#f9c74f';
    ctx.strokeStyle='#ffaa00'; ctx.lineWidth=1;
    ctx.strokeRect(-dw/2,-dh,dw,dh);
  }

  // Windows
  ctx.shadowBlur=0;
  ctx.fillStyle=o.subscriber?'rgba(249,199,79,0.25)':'rgba(80,80,120,0.2)';
  const ww=10*sc, wh=8*sc;
  ctx.fillRect(-hw/2+5*sc,-hh+8*sc,ww,wh);
  ctx.fillRect(hw/2-5*sc-ww,-hh+8*sc,ww,wh);

  // Mailbox
  ctx.shadowBlur=0;
  ctx.fillStyle=o.hit?'#06d6a0':'#888';
  ctx.fillRect(-4*sc,-4*sc,8*sc,4*sc);
  ctx.fillRect(-3*sc,-9*sc,4*sc,6*sc);

  // House number
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.font=`${Math.max(5,6*sc)}px 'Press Start 2P'`;
  ctx.textAlign='center'; ctx.fillText(o.num,0,8*sc);
  ctx.textAlign='left';
  ctx.restore();
}

function drawObstacle(sx,sy,o,sc){
  if(o.hit) return;
  ctx.save(); ctx.translate(sx,sy);
  const hw=o.hw*sc, hh=o.hh*sc;
  if(o.otype==='car'){
    ctx.fillStyle='#c01030';
    ctx.fillRect(-hw,-hh*1.4,hw*2,hh*2.8);
    ctx.fillStyle='rgba(100,200,255,0.35)';
    ctx.fillRect(-hw+3*sc,-hh*1.4+4*sc,hw*2-6*sc,hh*0.9);
    ctx.fillStyle='#111';
    [[-hw+3*sc,-hh],[hw-3*sc,-hh],[-hw+3*sc,hh],[hw-3*sc,hh]].forEach(([dx,dy])=>{
      ctx.beginPath(); ctx.arc(dx,dy,4*sc,0,Math.PI*2); ctx.fill();
    });
  } else if(o.otype==='cone'){
    ctx.fillStyle='#ff6600';
    ctx.beginPath(); ctx.moveTo(0,-hh*2); ctx.lineTo(-hw,hh); ctx.lineTo(hw,hh); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.fillRect(-hw,0,hw*2,3*sc);
  } else if(o.otype==='dog'){
    ctx.fillStyle='#c8a060';
    ctx.beginPath(); ctx.ellipse(0,0,hw*1.2,hh*0.8,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hw*0.9,-hh*0.5,hw*0.6,hh*0.7,0.3,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#a07840'; ctx.lineWidth=2*sc;
    [-hw*0.6,-hw*0.2,hw*0.2,hw*0.6].forEach(dx=>{ctx.beginPath();ctx.moveTo(dx,hh*0.5);ctx.lineTo(dx,hh*1.4);ctx.stroke();});
  } else {
    ctx.fillStyle='rgba(50,100,200,0.5)';
    ctx.beginPath(); ctx.ellipse(0,0,hw*1.5,hh,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(100,150,255,0.4)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(0,0,hw*0.8,hh*0.5,0,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

function drawPlayer(){
  const {sx,sy}=roadToScreen(0,playerPerp);
  if(playerInv>0&&Math.floor(playerInv/6)%2===1) return;
  ctx.save(); ctx.translate(sx,sy);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(2,14,14,5,0,0,Math.PI*2); ctx.fill();

  // Wheels
  ctx.shadowBlur=5; ctx.shadowColor='#00f5d4'; ctx.strokeStyle='#00f5d4'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(2,7,9,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(2,-11,9,0,Math.PI*2); ctx.stroke();

  // Frame
  ctx.strokeStyle='#f9c74f'; ctx.shadowColor='#f9c74f';
  ctx.beginPath(); ctx.moveTo(2,16); ctx.lineTo(2,0); ctx.lineTo(-3,-11); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,0); ctx.lineTo(7,-11); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(10,0); ctx.stroke();

  // Rider
  ctx.shadowBlur=0;
  ctx.fillStyle='#4a4a8a'; ctx.fillRect(-5,-26,12,18);
  ctx.fillStyle='#f0c090'; ctx.beginPath(); ctx.arc(2,-33,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f72585'; ctx.beginPath(); ctx.arc(2,-33,6.5,Math.PI,2*Math.PI); ctx.fill();
  ctx.strokeStyle='#4a4a8a'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-5,-20); ctx.lineTo(-13,-14); ctx.stroke();

  // Paper bag
  if(papersLeft>0){
    ctx.fillStyle='#e8d090'; ctx.fillRect(-19,-18,10,12);
    ctx.strokeStyle='#c8b060'; ctx.lineWidth=1; ctx.strokeRect(-19,-18,10,12);
  }
  ctx.restore();
}

document.getElementById('ov-start').addEventListener('click',startGame);
draw();
</script>
